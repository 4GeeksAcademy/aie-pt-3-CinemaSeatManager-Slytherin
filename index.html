<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seat Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #f3efe7;
        --bg-2: #d9ebff;
        --card: #fffdf9;
        --ink: #1f2937;
        --free: #d1fae5;
        --busy: #fecaca;
        --accent: #0f766e;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #fff6d6 0, transparent 30%),
          radial-gradient(circle at 90% 20%, #c7e5ff 0, transparent 35%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
      }

      .seat {
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .seat:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(17, 24, 39, 0.12);
      }

      .seat-free {
        background: var(--free);
        border-color: #34d399;
      }

      .seat-busy {
        background: var(--busy);
        border-color: #f87171;
      }
    </style>
  </head>
  <body class="px-4 py-8 sm:px-8">
    <main class="mx-auto w-full max-w-6xl">
      <section class="mb-6 rounded-3xl border border-black/10 bg-[var(--card)]/90 p-6 shadow-xl backdrop-blur sm:p-8">
        <p class="mb-2 text-sm font-semibold uppercase tracking-[0.22em] text-teal-700">Cinema Console</p>
        <h1 class="text-3xl font-bold sm:text-5xl">Cinema Seat Manager</h1>
        <p class="mt-3 max-w-3xl text-sm text-slate-600 sm:text-base">
          Gestiona una sala de 8 filas por 10 columnas. Puedes reservar, liberar o actualizar la vista de los asientos.
        </p>
      </section>

      <section class="grid gap-6 lg:grid-cols-[330px_1fr]">
        <aside class="rounded-3xl border border-black/10 bg-[var(--card)] p-6 shadow-lg">
          <h2 class="mb-4 text-xl font-bold">Controles</h2>

          <div class="space-y-4">
            <label class="block">
              <span class="mb-1 block text-sm font-semibold text-slate-700">Fila (0 a 7)</span>
              <input
                id="filaInput"
                type="number"
                min="0"
                max="7"
                value="0"
                class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none ring-teal-500 focus:ring"
              />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-semibold text-slate-700">Columna (0 a 9)</span>
              <input
                id="columnaInput"
                type="number"
                min="0"
                max="9"
                value="0"
                class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none ring-teal-500 focus:ring"
              />
            </label>

            <div class="grid gap-3 pt-2">
              <button
                id="reservarBtn"
                class="rounded-xl bg-teal-700 px-4 py-2 font-semibold text-white transition hover:bg-teal-800"
              >
                Reservar
              </button>
              <button
                id="liberarBtn"
                class="rounded-xl bg-amber-600 px-4 py-2 font-semibold text-white transition hover:bg-amber-700"
              >
                Liberar
              </button>
              <button
                id="actualizarBtn"
                class="rounded-xl border border-slate-300 bg-white px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-100"
              >
                Actualizar vista
              </button>
            </div>
          </div>

          <p id="mensaje" class="mt-5 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm font-medium text-slate-700">
            Sistema iniciado.
          </p>

          <div class="mt-5 flex items-center gap-5 text-sm font-medium text-slate-700">
            <div class="flex items-center gap-2">
              <span class="h-4 w-4 rounded border border-emerald-400 bg-emerald-200"></span>
              Libre (0)
            </div>
            <div class="flex items-center gap-2">
              <span class="h-4 w-4 rounded border border-red-400 bg-red-200"></span>
              Ocupado (1)
            </div>
          </div>
        </aside>

        <section class="rounded-3xl border border-black/10 bg-[var(--card)] p-6 shadow-lg">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-xl font-bold">Vista de la sala</h2>
            <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-slate-600">8 x 10</span>
          </div>
          <div id="salaGrid" class="grid grid-cols-10 gap-2"></div>
        </section>
      </section>
    </main>

    <script>
      const FILAS = 8;
      const COLUMNAS = 10;
      const sala = Array.from({ length: FILAS }, () => Array(COLUMNAS).fill(0));

      const filaInput = document.getElementById("filaInput");
      const columnaInput = document.getElementById("columnaInput");
      const reservarBtn = document.getElementById("reservarBtn");
      const liberarBtn = document.getElementById("liberarBtn");
      const actualizarBtn = document.getElementById("actualizarBtn");
      const mensaje = document.getElementById("mensaje");
      const salaGrid = document.getElementById("salaGrid");

      function mostrarSala() {
        salaGrid.innerHTML = "";

        for (let fila = 0; fila < FILAS; fila += 1) {
          for (let columna = 0; columna < COLUMNAS; columna += 1) {
            const ocupado = sala[fila][columna] === 1;
            const asiento = document.createElement("div");
            asiento.className = [
              "seat flex h-12 items-center justify-center rounded-lg border text-xs font-bold sm:text-sm",
              ocupado ? "seat-busy" : "seat-free"
            ].join(" ");
            asiento.textContent = `F${fila}C${columna}`;
            asiento.title = ocupado ? "Ocupado" : "Libre";
            salaGrid.appendChild(asiento);
          }
        }
      }

      function reservarAsiento(fila, columna) {
        if (fila < 0 || fila > 7 || columna < 0 || columna > 9) {
          return "asiento fuera de rango";
        }

        if (sala[fila][columna] === 1) {
          return "ese asiento ya esta ocupado";
        }

        sala[fila][columna] = 1;
        return "reserva hecha";
      }

      function liberarAsiento(fila, columna) {
        if (fila < 0 || fila > 7 || columna < 0 || columna > 9) {
          return "asiento fuera de rango";
        }

        if (sala[fila][columna] === 0) {
          return "ese asiento ya estaba libre";
        }

        sala[fila][columna] = 0;
        return "asiento liberado";
      }

      function leerDatos() {
        const fila = Number(filaInput.value);
        const columna = Number(columnaInput.value);
        return { fila, columna };
      }

      function actualizarMensaje(texto) {
        mensaje.textContent = texto;
      }

      reservarBtn.addEventListener("click", () => {
        const datos = leerDatos();
        const resultado = reservarAsiento(datos.fila, datos.columna);
        actualizarMensaje(resultado);
        mostrarSala();
      });

      liberarBtn.addEventListener("click", () => {
        const datos = leerDatos();
        const resultado = liberarAsiento(datos.fila, datos.columna);
        actualizarMensaje(resultado);
        mostrarSala();
      });

      actualizarBtn.addEventListener("click", () => {
        mostrarSala();
        actualizarMensaje("vista actualizada");
      });

      mostrarSala();
    </script>
  </body>
</html>
