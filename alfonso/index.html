<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seat Manager - Alfonso</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="contenedor">
      <h1>Cinema Seat Manager</h1>
      <p class="subtitulo">Version facil en HTML, CSS y JavaScript</p>

      <section class="panel">
        <label for="fila">Fila (0 a 7)</label>
        <input id="fila" type="number" min="0" max="7" />

        <label for="columna">Columna (0 a 9)</label>
        <input id="columna" type="number" min="0" max="9" />

        <div class="botones">
          <button id="btnReservar">Reservar</button>
          <button id="btnLiberar">Liberar</button>
          <button id="btnActualizar">Actualizar vista</button>
        </div>

        <p id="mensaje">Bienvenido al gestor de asientos</p>
      </section>

      <section class="panel">
        <h2>Estado de la sala</h2>
        <p class="leyenda">L = libre, O = ocupado</p>
        <div id="sala"></div>
      </section>
    </main>

    <script src="../app.js"></script>
  </body>
</html>
