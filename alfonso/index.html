<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seat Manager - Alfonso</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: #fffdf8;
        --text: #1f1f1f;
        --muted: #6b6b6b;
        --border: #d8cfc0;
        --free: #d9f7df;
        --busy: #ffd9d9;
        --primary: #155eef;
        --primary-soft: #e6efff;
        --warning: #a12f2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 5%, #ffffff 0%, rgba(255, 255, 255, 0) 35%),
          radial-gradient(circle at 90% 0%, #e6f0ff 0%, rgba(230, 240, 255, 0) 38%),
          var(--bg);
        color: var(--text);
        padding: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        max-width: 940px;
        margin: 0 auto;
        box-shadow: 0 12px 24px rgba(44, 35, 18, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 1.9rem;
        letter-spacing: 0.5px;
      }

      .subtitulo {
        margin: 4px 0 14px;
        color: var(--muted);
      }

      .controles {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        margin-bottom: 12px;
      }

      .campo {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 0.92rem;
      }

      input {
        width: 105px;
        padding: 8px;
        border: 1px solid #bfb5a5;
        border-radius: 8px;
        background: #fff;
      }

      input:focus {
        outline: 2px solid var(--primary-soft);
        border-color: var(--primary);
      }

      button {
        padding: 9px 12px;
        border: 1px solid #b8b0a0;
        border-radius: 8px;
        cursor: pointer;
        background: #f3efe7;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:active {
        transform: scale(0.98);
      }

      button:hover {
        background: #ece6db;
      }

      #btnReservar {
        background: #1f8f41;
        color: #fff;
        border-color: #1f8f41;
      }

      #btnReservar:hover {
        background: #197337;
      }

      #btnLiberar {
        background: #b94040;
        color: #fff;
        border-color: #b94040;
      }

      #btnLiberar:hover {
        background: #953232;
      }

      #estado {
        margin: 8px 0 12px;
        padding: 10px;
        border-radius: 8px;
        background: var(--primary-soft);
        border: 1px solid #c8dafd;
      }

      #estado.error {
        background: #ffe9e9;
        border-color: #ffb7b7;
        color: var(--warning);
      }

      .info {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .badge {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.9rem;
        background: #fff;
      }

      .badge-libre {
        background: var(--free);
      }

      .badge-ocupado {
        background: var(--busy);
      }

      .stats {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .stat {
        min-width: 120px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      .stat strong {
        display: block;
        font-size: 1.1rem;
      }

      .pantalla {
        text-align: center;
        font-size: 0.9rem;
        color: #514c43;
        background: linear-gradient(90deg, #ddd4c5 0%, #f7f2e7 50%, #ddd4c5 100%);
        border: 1px solid #ccbfa7;
        border-radius: 999px;
        padding: 6px;
        margin: 6px 0 12px;
      }

      .fila {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
      }

      .numero-fila {
        width: 28px;
        display: inline-block;
        font-weight: bold;
        color: #4b453a;
      }

      .asiento {
        display: inline-block;
        width: 28px;
        line-height: 28px;
        border: 1px solid #57514a;
        border-radius: 6px;
        text-align: center;
        margin-right: 4px;
        cursor: pointer;
        user-select: none;
        font-size: 0.9rem;
      }

      .libre {
        background: var(--free);
      }

      .ocupado {
        background: var(--busy);
      }

      .seleccionado {
        outline: 3px solid var(--primary);
      }

      #sala {
        margin-top: 8px;
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }

        .panel {
          padding: 12px;
        }

        h1 {
          font-size: 1.55rem;
        }

        .controles {
          gap: 8px;
        }

        input {
          width: 100%;
        }

        .campo {
          flex: 1 1 100px;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Cinema Seat Manager</h1>
      <p class="subtitulo">Selecciona tu asiento de forma visual y reserva en un clic.</p>

      <div class="controles">
        <div class="campo">
          <label for="fila">Fila (0 a 7)</label>
          <input id="fila" type="number" min="0" max="7" />
        </div>

        <div class="campo">
          <label for="columna">Columna (0 a 9)</label>
          <input id="columna" type="number" min="0" max="9" />
        </div>

        <button id="btnReservar">Reservar</button>
        <button id="btnLiberar">Liberar</button>
        <button id="btnActualizar">Actualizar vista</button>
      </div>

      <div id="estado">Selecciona un asiento o escribe fila/columna.</div>

      <div class="info">
        <span class="badge badge-libre">L = libre</span>
        <span class="badge badge-ocupado">O = ocupado</span>
        <span class="badge">Haz clic en un asiento para autocompletar fila y columna</span>
      </div>

      <div class="stats">
        <div class="stat">
          <strong id="totalLibres">0</strong>
          <span>Asientos libres</span>
        </div>
        <div class="stat">
          <strong id="totalOcupados">0</strong>
          <span>Asientos ocupados</span>
        </div>
      </div>

      <div class="pantalla">PANTALLA</div>
      <div id="sala"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
